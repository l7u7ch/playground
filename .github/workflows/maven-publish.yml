name: Scala Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up JDK 11
        uses: actions/setup-java@v2
        with:
          java-version: "11"
          distribution: "temurin"
      - name: Build with Maven
        run: mvn clean package
      - name: Upload Artifacts
        uses: actions/upload-artifact@v2
        with:
          name: packaged-jars
          path: target/*.jar
